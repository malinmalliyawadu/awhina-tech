version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Pacific/Auckland
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      next:
        patterns:
          - "next"
          - "eslint-config-next"
          - "@next/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
      radix:
        patterns:
          - "radix-ui"
          - "@radix-ui/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Pacific/Auckland
    labels:
      - dependencies
      - github-actions
