server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;
    server_tokens off;

    # Long cache for fingerprinted Astro assets
    location /_astro/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Static media
    location ~* \.(?:jpg|jpeg|gif|png|webp|avif|svg|ico|woff2?|ttf|otf|mp4|webm)$ {
        access_log off;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    # Don't cache HTML so deploys propagate immediately
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ $uri.html /index.html;
    }

    # Astro static build emits 404.html
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
}
